<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#020d0d;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    font-family:Cairo,sans-serif;

}

/* 320x240 screen */

.screen{

    width:320px;
    height:240px;

    background:
    linear-gradient(rgba(0,18,18,.96),rgba(0,10,10,.98));

    border:1px solid #7f6a32;

    color:#d6cfaa;

    display:flex;
    flex-direction:column;

    box-shadow:
    inset 0 0 25px rgba(0,255,180,.08);

}

/* ---------------- HEADER ---------------- */

.header{

    height:46px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:6px 10px;

    border-bottom:1px solid #655322;

}

.logo{

    text-align:right;
    color:#e3bf62;
    line-height:1.1;
}

.logo small{

    font-size:8px;
    color:#c5b373;

}

.info{

    text-align:left;

    font-size:10px;

}

.time{

    color:#00ffd0;
    font-size:12px;
    font-weight:bold;
}

/* ---------------- DESKTOP ---------------- */

.desktop{

    flex:1;

    padding:10px;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px;

}

.icon{

    border:1px solid #34514b;

    background:
    linear-gradient(
    rgba(255,220,100,.03),
    rgba(0,255,220,.02));

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}

.icon:hover{

    border-color:#00ffd0;

}

.symbol{

    font-size:20px;
    color:#00ffd0;

}

.label{

    margin-top:4px;
    font-size:10px;
}

/* ---------------- STATUS ---------------- */

.status{

    height:26px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 10px;

    border-top:1px solid #2f4741;

    font-size:10px;

}

.online{

    color:#00ffd0;
}

/* ---------------- FOOTER ---------------- */

.footer{

    height:30px;

    border-top:1px solid #655322;

    display:flex;

}

.footer div{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    color:#dcbf66;

    font-size:11px;

}

.footer div:first-child{

    border-left:1px solid #655322;

}

</style>

</head>

<body>

<div class="screen">

    <div class="header">

        <div class="logo">

            نظام الحكمة

            <br>

            <small>AL-HIKMAH OS</small>

        </div>

        <div class="info">

            ١٢ / ٠٥ / ١٤٤٧ هـ

            <br>
            الدمام&nbsp;
            <span class="time">23:48</span>
        </div>

    </div>

    <div class="desktop">

        <div class="icon">
            <div class="symbol"></div>
            <div class="label">ملاحظات</div>
        </div>

        <div class="icon">
            <div class="symbol"></div>
            <div class="label">الحاسبة</div>
        </div>

        <div class="icon">
            <div class="symbol"></div>
            <div class="label">الملفات</div>
        </div>

        <div class="icon">
            <div class="symbol"></div>
            <div class="label">الإعدادات</div>
        </div>

    </div>

    <div class="status">

        <span>حالة النظام</span>

        <span class="online">◉ مستقر</span>

    </div>

    <div class="footer">

        <div>النظام</div>

        <div>استخدام الموارد</div>

    </div>

</div>

</body>
</html>
